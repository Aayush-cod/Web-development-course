<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            border: 2px solid black;
            padding:34px;
            box-shadow: 5px 5px 15px 5px #32b018;
        }
        .text-element{
            text-shadow: 2px 2px 4px #888888;
            outline: 2px solid red;
            outline-offset: 30px;
            border-radius: 20px;
            border: 2px solid green;
        }
    </style>
</head>
<body>
    <div class="box">I am a box</div>

    <p class="text-element">Lorem ipsum dolor sit amet, consectetur adipisicing elit. Officiis quod dignissimos tenetur nobis laborum, consequuntur ipsam maxime, totam quasi explicabo quo reiciendis doloribus aut ipsum amet iusto! Sed saepe accusantium, dignissimos voluptate ipsum minus voluptatibus.</p>
</body>
</html>
