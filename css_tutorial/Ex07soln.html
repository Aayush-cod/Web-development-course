        .nav {

        .logo {

        }

        img {
            height: 60px;
        }

            align-items: center;

        }

        }

        }

            align-items: center;
        }

        .container {

            width: 60vw;

            margin: 20px;

            grid-template-columns: repeat(3, 1fr);




        }

        .box {

            height: 140px;
            background-color: rgb(238, 236, 236);
            border: 2px solid white;
            border-radius: 5px;
            margin: 10px;
