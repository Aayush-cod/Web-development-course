<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Box</title>
    <style>
        .container {

            border: 2px solid red;
            display: flex;
            /* flex-direction: row; */
            height: 80vh;

            /* Justifies items horizontally center. */
            /* justify-content: center; */
            /* Alings items vertically center- best for single line row */
            /* align-items: center;   */
            /* Best for alining vertically content multiple row  */
            /* align-content: flex-start; */

            /* Items = single line
               content = multiple lines */

            /* There is no justify-items in flexbox */
            flex-wrap: wrap;
            flex-flow: row wrap;
            /* gap: 30px; */

            /* row-gap: 10px  ; */
            /* column-gap: 10px; */

            gap: 40px 10px;

        }

        .item {
            height: 92px;
            width: 92px;
            border: 2px solid black;
            /* margin: 4px; */
            background-color: blueviolet;
            /* Items take the proper width of container using flex grow and changes their size according to adjusting width of container */
            flex-grow: 1;
        }

        .order-1 {
            order: 4;
            /* We can increase flex grow for a certain item */
            flex-grow: 2; 
            flex-shrink: 2;

            /* aling items in ur necessary way */
            align-self: flex-end;
        }

        .order-2 {
            order: 2;
        }
    </style>
</head>

<body>
    <main>
        <div class="container">
            <div class="item order-1">one</div>
            <div class="item order-2">two</div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>

            <div class="item"></div>

            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>

        </div>
    </main>
</body>

</html>
