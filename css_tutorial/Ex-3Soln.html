<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card</title>
    <style>
        .card {
            height: 500px;
            width: 300px;
            border: 2px solid gray;
            border-radius: 12px;
            position: absolute;
            box-shadow: 5px 5px 15px 5px #6d6e6d;
        }

        .img img {
            margin: 4px;
            padding: 4px;

            border: 2px soluid grey;
            border-radius: 12px;
            position: relative;
            left: 0vw;
            
        }

        .box1 {
            position: relative;
            padding: 12px;
            
        }

        .box1 span {
            border: 1px solid gray;
            border-radius: 10px;
            padding: 2px;
        }

        .content {
            padding-left: 12px;
            padding-right: 10px;
            
            
        }

        .button {
            align-content: center;
            position: relative;
            left: 6vw;
            top: 10px;
        }

        .button span {
            border: 1px solid gray;
            border-radius: 18px;
            padding: 10px;
            color: rgb(58, 124, 194);
            background-color: rgb(227, 237, 239);
           

        }
    </style>
</head>

<body>
    <div class="card">

        <div class="img">

            <img src="https://www.desktophut.com/images/1706121121.webp" height="200px" width="280px" padding="3px">
        </div>



        <div class="box1">
            <span>Nature</span>
            <span>Nature</span>
        </div>

        <div class="content">
            <h1> Lago di Braies</h1>

            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Dolorum reprehenderit odio, odit voluptatibus
                sunt eveniet. Recusandae repellendus eum beatae officia!</p>

        </div>



        <div class="button"><span>Read more</span></div>


    </div>

</body>

</html>
