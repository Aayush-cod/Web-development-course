<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Css Grid</title>
    <style>
        .container{
            width: 80vw;
            height: 100vh;
            /* Fr units takes 1/fr units here 1/3 of width */
            /* grid-template-columns: 1fr 2fr 1fr; */
             /* grid-template-columns: repeat(4, 1fr); */
             /* grid-template-columns: repeat(4,minmax(100px, 1fr)); */
            border: 2px solid black;
            display: grid;
            /* grid-template-columns: 120px 100px; */

            /* Naming grid lines */
            /* grid-template-columns: [first]120px [second]100px; */

            /* grid-template-rows: 100px 100px 100px; */

            /* gap: 10px; */

            row-gap: 15px;
            column-gap: 20px; 

            justify-items: center;
            align-items: center;

             grid-template-columns: repeat(4, 80px);

             /* justify-content: center; */

             grid-template-rows: repeat(2, 80px);
             /* align-content: center; */

            /* It justify and aling content center both horizontally and vertically */
             place-content: center;
        }

        .item{
            border: 2px solid red;
            height: 55px;
            width: 55px;
        }

        .item-4{
            /* grid-row:1/2 ; */
            /* Up one and down one same u can do anyone */
            /* grid-row-start: 1;
            grid-row-end: 2;

            /* grid-column: 1/2; */

            /* using naming grid lines  */

            /* grid-column: first/second; */ 

            /* align-self: flex-start;
            justify-self: flex-start; */
        }

         .item-1{
            /* grid-row:1/2 ;
            grid-column: 1/2; */
        }


    </style>
</head>
<body>
    <div class="container">
        <div class="item item-1">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item item-4">4</div>
        <div class="item">5</div>
    </div>
    
</body>
</html>
