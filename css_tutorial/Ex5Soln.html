<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout Design</title>
    <style>

        *{
            margin: 0;
            padding: 0 ;
            box-sizing: border-box;
        }

        body{
             padding-left: 300px;
           
        }

        .box{
            background-color: black;
            border: 2px solid wheat;

            height: 1200px;

            width: 800px;
             display: flex;
            flex-direction: column; 
           



    
        }

        .nav{
            background-color: plum;
            height: 50px;
            position: sticky;
            top: 0px;
          
        }

        .container{
            background-color: green;

            height: 400px;

            padding: 30px;
            margin: 15px;

             display: flex;              
            justify-content: space-between;
            padding-top: 45px;
            

            
        }

        .box-left{
            background-color: pink;
            height: 300px;
            width: 45%;
            
            
        }

        .box-right{
            background-color: blue;
            height: 300px;
            width: 45%;
            
        }

        .topic{
            border: 2px solid white;
            height: 100px;
            
            width: 60%;
            margin-top: 30px;
            margin-left: 150px;
            border-radius: 30px;
            
        }

        h2{
            color: white;
            padding: 15px;
            padding-left: 115px;
            font-size: 25px;
            font-weight: 5;
           
        }

        .circle{
            border: 2px solid wheat;
            background-color: yellow;
            border-radius: 50%;
            width: 100px;
            height: 100px;
            margin: 10px;
           
          

            position: fixed;
            bottom: 0;

            align-self: flex-end;

            
           
        }

        .footer{
            background-color: plum;
            height: 50px;

            margin-top: auto;

            /* position: sticky;
            bottom:0; */
          
        }

    </style>
</head>
<body>
    <div class="box">

        <div class="nav"></div>

        <div class="container">
            <div class="box-left"></div>
            <div class="box-right"></div>
        </div>

        <div class="topic">
            <h2>Welcome to Sigma web Development Express</h2>
        </div>
        <div class="circle"></div>
        <div class="footer"></div>
    </div>
</body>
</html>
